<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>

    body {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; font-family: Arial, sans-serif; background-color: #f4f4f4;
      background: url(https://i.pinimg.com/originals/36/a0/41/36a04197a7be4e694d9f35389287841c.gif);
      background-repeat: no-repeat;
      background-size: cover;
    }
    .container {
      background-color:rgba(255, 255,255, 0); 
      
      padding: 30px;
       border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.22); width: 300px; text-align: center;
    }
    input, button {
      width: 100%; margin: 10px 0; padding: 10px;
      border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;
    }
    button {
      background: #007bff; color: white; border: none; cursor: pointer;
    }
    button:hover { background:  #92c638; }
    a { color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; right: 20px; display: flex; align-items: center;
      background-color: #333; color: white; padding: 12px 18px;
      border-radius: 50px; opacity: 0; transform: translateY(-20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-icon {
      background: #007bff; border-radius: 50%; width: 28px; height: 28px;
      display: flex; justify-content: center; align-items: center;
      margin-right: 10px; font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <form id="loginForm">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <a href="register.html" style="color: white;">Sign Up </a>
    </form>
  </div>

  <div id="toast" class="toast">
    <div class="toast-icon">✔️</div>
    <div id="toast-message"></div>
  </div>

  <script>
    if (sessionStorage.getItem("user")) window.location.href = "index.html";

    function showToast(msg, icon="✔️") {
      const toast = document.getElementById("toast");
      const msgEl = document.getElementById("toast-message");
      const iconEl = document.querySelector(".toast-icon");
      msgEl.textContent = msg; iconEl.textContent = icon;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const user = localStorage.getItem(username);
      if (user) {
        const parsed = JSON.parse(user);
        if (parsed.password === password) {
          sessionStorage.setItem("user", JSON.stringify(parsed)); // ✅ Store session data
          showToast("Login successful!", "✅");
          setTimeout(() => window.location.href = "index.html", 1500);
        } else showToast("Incorrect password!", "❌");
      } else showToast("User not found!", "⚠️");
    });
  </script>
</body>
</html>
